<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Phishing Detector V2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="header-title">
        <svg class="icon" viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
        </svg>
        <h2>AI Phishing Detector</h2>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="demo-mode-toggle">
        <span class="slider"></span>
        <span class="toggle-label">Demo Mode</span>
      </label>
    </header>
    
    <div class="url-card">
      <div class="url-label">CURRENT WEBSITE</div>
      <p id="current-url" class="truncate">Detecting URL...</p>
    </div>
    
    <div id="loading" class="state-container hidden">
      <div class="spinner"></div>
      <p class="loading-text">Analyzing website security...</p>
    </div>

    <div id="result" class="state-container hidden">
      <div id="status-badge" class="badge">
        <span id="status-icon"></span>
        <span id="status-text">SAFE</span>
      </div>
      
      <div class="score-card">
        <div class="score-label">THREAT SCORE</div>
        <div class="score-value">
          <span id="threat-score">0</span>
          <span class="score-max">/100</span>
        </div>
        <div class="score-bar-bg">
          <div id="score-bar-fill" class="score-bar-fill"></div>
        </div>
      </div>

      <div class="reasons-card">
        <div class="reasons-label">DETAILED ANALYSIS</div>
        <ul id="reasons-list"></ul>
      </div>
    </div>
    
    <div id="error" class="state-container error-state hidden">
      <svg class="error-icon" viewBox="0 0 24 24" width="32" height="32">
        <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      <p id="error-message">Connection failed</p>
      <button id="retry-btn" class="btn">Try Again</button>
    </div>
    
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
